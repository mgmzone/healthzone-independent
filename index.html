
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthZone — Hit your weight goal by a specific date</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="description" content="A weight-loss tracker built around hitting a specific target by a specific date. Weight, fasting, meals, exercise, daily compliance goals, journal, and an AI coach — all in one honest tool." />
    <meta name="author" content="HealthZone" />

    <!-- Open Graph (Facebook, iMessage, Slack, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HealthZone" />
    <meta property="og:title" content="HealthZone — Hit your weight goal by a specific date" />
    <meta property="og:description" content="A weight-loss tracker built around hitting a specific target by a specific date. Smart forecasts, AI coach, intermittent-fasting tracking, daily compliance goals, and a free-form journal." />
    <meta property="og:url" content="https://healthzone.mgm.zone/" />
    <meta property="og:image" content="https://healthzone.mgm.zone/og-image.png" />
    <meta property="og:image:width" content="1200" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HealthZone — Hit your weight goal by a specific date" />
    <meta name="twitter:description" content="A weight-loss tracker built around hitting a specific target by a specific date. Smart forecasts + AI coach + IF tracking + daily goals + journal." />
    <meta name="twitter:image" content="https://healthzone.mgm.zone/og-image.png" />
    <script>
      // Apply theme before React mounts to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('healthzone-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((!stored || stored === 'system') && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
