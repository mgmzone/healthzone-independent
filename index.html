
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthZone</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="description" content="HealthZone - Personal Health and Fitness Tracker" />
    <meta name="author" content="HealthZone" />
    <meta property="og:image" content="/og-image.png" />
    <script>
      // Apply theme before React mounts to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('healthzone-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((!stored || stored === 'system') && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
